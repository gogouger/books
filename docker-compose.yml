services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    environment:
      - BOOKS_DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    stop_grace_period: 3s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    ports:
      - "60022:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro
      - ./data/covers:/data/covers:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    stop_grace_period: 2s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
