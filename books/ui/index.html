<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athenaeum</title>
    <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=6">
    <script>
        (function() {
            var t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', t);
        })();
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" id="nav-brand" href="#">
                <i class="bi bi-bookshelf"></i> Athenaeum
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto" id="nav-links">
                    <li class="nav-item">
                        <a class="nav-link" href="#/favs" id="nav-favs">My Favs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#/library" id="nav-library">Library</a>
                    </li>
                    <li class="nav-item" id="nav-add-item">
                        <a class="nav-link" href="#/add" id="nav-add">Add Book</a>
                    </li>
                    <li class="nav-item" id="nav-scan-item">
                        <a class="nav-link" href="#/scan" id="nav-scan"><i class="bi bi-upc-scan me-1"></i>Scan</a>
                    </li>
                </ul>
                <div class="navbar-nav" id="nav-user">
                    <a class="nav-link d-none" href="#" id="nav-my-library">My Library</a>
                    <span class="nav-link" id="nav-username"></span>
                    <a class="nav-link d-none" href="/" id="nav-signin">Sign In</a>
                    <a class="nav-link" href="#" id="nav-logout">Logout</a>
                </div>
                <button class="theme-toggle" id="theme-toggle"
                        title="Toggle dark mode">
                    <i class="bi bi-moon-fill"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="app" class="container-fluid mt-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
    <script src="/dist/app.js?v=31"></script>
</body>
</html>
